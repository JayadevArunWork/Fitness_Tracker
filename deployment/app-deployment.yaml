apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-tracker-app
  namespace: fitness-ns

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: fitness-tracker-app

  template:
    metadata:
      labels:
        app: fitness-tracker-app

    spec:
      containers:
      - name: fitness-tracker-app

        image: pulkit197/fitness_tracker-master-copy3-fitness-app:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 5000

        envFrom:
        - configMapRef:
            name: fitness-configmap

        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: MONGO_URI

---
apiVersion: v1
kind: Service
metadata:
  name: fitness-tracker-service
  namespace: fitness-ns

spec:
  selector:
    app: fitness-tracker-app

  ports:
  - port: 80
    targetPort: 5000

  type: LoadBalancer